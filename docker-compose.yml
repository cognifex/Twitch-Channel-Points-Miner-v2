services:
  miner:
    image: ${MINER_IMAGE:-twitch-channel-points-miner-v2:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-twitch-channel-points-miner}
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      TERM: ${TERM:-xterm-256color}
      TZ: ${TZ:-UTC}
    volumes:
      - ${ANALYTICS_DIR:-./analytics}:/usr/src/app/analytics
      - ${COOKIES_DIR:-./cookies}:/usr/src/app/cookies
      - ${LOGS_DIR:-./logs}:/usr/src/app/logs
      - ${RUN_FILE:-./example.py}:/usr/src/app/run.py:ro
    ports:
      - "${ANALYTICS_PORT:-5000}:5000"

  webui:
    image: python:3.11-slim
    container_name: ${WEBUI_CONTAINER_NAME:-twitch-channel-points-webui}
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir flask requests && python /app/web_interface.py"
    environment:
      WEBUI_CONFIG_PATH: /data/config.json
      WEBUI_LOG_PATH: /data/logs/latest.log
      WEBUI_PORT: 8080
    volumes:
      - ./web_interface.py:/app/web_interface.py:ro
      - ./:/data
    ports:
      - "${WEBUI_PORT:-8080}:8080"
    depends_on:
      - miner
